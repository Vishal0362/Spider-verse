<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spider-Verse</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

</head>

<body class="bg-black text-white overflow-x-hidden">

  <!-- 🕷️ SIDE SPIDER-MAN -->
  <img src="assets/spidey.png"
       id="spiderman"
       class="fixed top-28 left-5 w-16 z-[1000] pointer-events-none">

  <!-- 🕸️ WEB -->
  <div id="web-line"
       class="fixed top-0 left-8 w-[2px] h-[120px] bg-white z-[999]"></div>

  <!-- HERO -->
  <section class="relative h-screen overflow-hidden">

    <!-- Background -->
    <img src="assets/bg-mid.jpg"
         class="absolute w-full h-full object-cover brightness-75 contrast-125">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black opacity-80"></div>

    <!-- Navbar -->
    <div class="absolute top-5 left-1/2 -translate-x-1/2 w-[80%] px-8 py-4
                flex justify-between items-center rounded-full
                backdrop-blur-md bg-white/10 z-10">

      <div class="text-red-500 font-bold">🕷 SPIDEY</div>

      <div class="space-x-6 text-white">
        <span class="cursor-pointer">LEAP</span>
        <span class="cursor-pointer">MOVIES</span>
        <span class="cursor-pointer">MULTIVERSE</span>
        <span class="cursor-pointer">VILLAINS</span>
        <span class="cursor-pointer">POWERS</span>
      </div>
    </div>

    <!-- Content -->
    <div class="absolute top-[55%] left-1/2 -translate-x-1/2 -translate-y-1/2 text-center z-10">

      <p class="text-yellow-400 tracking-[4px] text-sm">
        YOUR FRIENDLY NEIGHBORHOOD
      </p>

      <h1 class="spidey-title">SPIDER-VERSE</h1>

      <p class="text-gray-300 max-w-xl mx-auto mt-2">
        With great power comes great responsibility. Swing through the complete saga of the wall-crawler.
      </p>

      <p class="text-yellow-400 font-bold mt-5">
        SCROLL TO SWING ↓
      </p>

    </div>

  </section>

  <!-- SECTION 1 -->
  <section class="h-screen flex items-center justify-center bg-gray-900">
    <h2 class="text-4xl">Who is Spider-Man?</h2>
  </section>

  <!-- SECTION 2 -->
  <section class="h-screen flex items-center justify-center bg-black">
    <h2 class="text-4xl">Movies & Multiverse</h2>
  </section>

  <!-- SECTION 3 -->
  <section class="h-screen flex items-center justify-center bg-gray-900">
    <h2 class="text-4xl">Villains</h2>
  </section>

  <!-- SECTION 4 -->
  <section class="flex justify-center gap-10 p-20 flex-wrap">

    <div class="bg-white text-black p-8 font-bold border-[5px] border-black
                rotate-[-2deg] shadow-[12px_12px_0_red]
                transition hover:scale-110 hover:rotate-0">
      Peter Parker
    </div>

    <div class="bg-white text-black p-8 font-bold border-[5px] border-black
                rotate-[-2deg] shadow-[12px_12px_0_red]
                transition hover:scale-110 hover:rotate-0">
      Miles Morales
    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
